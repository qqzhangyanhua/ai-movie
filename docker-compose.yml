services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aimovie}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aimovie_secret}
      POSTGRES_DB: ${POSTGRES_DB:-aimovie}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    depends_on:
      - postgres
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./backend
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    depends_on:
      - postgres
      - redis
    command: celery -A app.tasks worker --loglevel=info --concurrency=3

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - web

volumes:
  postgres_data:
  upload_data:
